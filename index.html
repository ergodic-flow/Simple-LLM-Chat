<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <h2>Settings</h2>
      <label for="api-host">API Host</label>
      <input type="text" id="api-host" value="http://0.0.0.0:8000" placeholder="http://0.0.0.0:8000">
      <label for="model-select">Model</label>
      <select id="model-select">
        <option value="">(server default)</option>
      </select>
      <button id="refresh-models-btn">Refresh Models</button>
      <label for="system-prompt">System Prompt</label>
      <textarea id="system-prompt" rows="4" placeholder="You are a helpful assistant."></textarea>
      <div class="toggle-row">
        <label for="reasoning-toggle">Reasoning</label>
        <label class="switch">
          <input type="checkbox" id="reasoning-toggle">
          <span class="slider"></span>
        </label>
      </div>
      <label for="speech-speed">Speech Speed</label>
      <div class="slider-row">
        <input type="range" id="speech-speed" min="0.5" max="2.0" step="0.1" value="1.5">
        <span id="speech-speed-val">1.5x</span>
      </div>
      <button id="clear-btn">Clear Chat</button>
    </div>
    <div id="main">
      <div id="chat-container">
        <div id="messages"></div>
      </div>
      <div id="input-area">
        <div id="preview-bar"></div>
        <div id="input-row">
          <label id="upload-btn" title="Attach image">
            📎
            <input type="file" id="image-input" accept="image/*" hidden>
          </label>
          <button id="mic-btn" title="Hold to record (or hold Space)">🎤</button>
          <div id="recording-indicator"><span class="rec-dot"></span> Recording…</div>
          <textarea id="user-input" rows="1" placeholder="Type a message…"></textarea>
          <button id="send-btn">Send</button>
        </div>
      </div>
    </div>
  </div>
  <div id="lightbox" class="lightbox-overlay">
    <img id="lightbox-img" src="" alt="">
  </div>
  <script src="tts.js"></script>
  <script src="app.js"></script>
</body>
</html>
